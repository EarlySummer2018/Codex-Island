name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-release:
    name: Build macOS installers
    runs-on: macos-15
    env:
      HAS_MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test Rust sidecar
        run: cargo test
        working-directory: codex-watcher

      - name: Import Apple signing certificate
        if: env.HAS_MACOS_CERTIFICATE == 'true'
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-keychain-password}"

          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Build Release app (universal)
        run: |
          rm -rf build
          xcodebuild \
            -project CodexIsland.xcodeproj \
            -scheme CodexIsland \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=YES \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            SYMROOT="$PWD/build" \
            build

      - name: Package macOS artifacts (default and universal)
        env:
          MACOS_APP_SIGN_IDENTITY: ${{ secrets.MACOS_APP_SIGN_IDENTITY }}
          MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          chmod +x scripts/package_macos_release.sh
          VERSION="${GITHUB_REF_NAME:-manual}" scripts/package_macos_release.sh build/Release/CodexIsland.app
          VERSION="${GITHUB_REF_NAME:-manual}" ARTIFACT_SUFFIX="-universal" CLEAN_DIST=0 scripts/package_macos_release.sh build/Release/CodexIsland.app

      - name: Build Release app (x86_64)
        run: |
          rm -rf build-x86_64
          CODEX_ISLAND_SIDECAR_ARCH=x86_64 xcodebuild \
            -project CodexIsland.xcodeproj \
            -scheme CodexIsland \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=YES \
            ARCHS='x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            SYMROOT="$PWD/build-x86_64" \
            build

      - name: Package macOS artifacts (x86_64)
        env:
          MACOS_APP_SIGN_IDENTITY: ${{ secrets.MACOS_APP_SIGN_IDENTITY }}
          MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}" ARTIFACT_SUFFIX="-x86_64" CLEAN_DIST=0 scripts/package_macos_release.sh build-x86_64/Release/CodexIsland.app

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CodexIsland-macOS
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          overwrite_files: true
          generate_release_notes: true
