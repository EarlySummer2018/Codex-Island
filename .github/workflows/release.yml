name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 要创建或更新的版本 tag
        required: true
        default: v1.2.1

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_type == 'tag' && github.ref_name || inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    name: 校验版本并生成中文发布说明
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve tag and generate changelog
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="$INPUT_TAG"
          fi

          if ! [[ "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "版本 tag 必须使用 vX.Y.Z 格式：$release_tag" >&2
            exit 1
          fi

          project_version="$(awk '/MARKETING_VERSION:/ { print $2; exit }' project.yml)"
          if [ "${release_tag#v}" != "$project_version" ]; then
            echo "tag $release_tag 与 project.yml 版本 $project_version 不一致。" >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          git fetch --tags --force

          if git rev-parse -q --verify "$release_tag^{commit}" >/dev/null; then
            previous_tag="$(git describe --tags --abbrev=0 "$release_tag^{commit}^" 2>/dev/null || true)"
            release_commit="$release_tag^{commit}"
          else
            previous_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            release_commit="$GITHUB_SHA"
          fi

          if [ -n "$previous_tag" ]; then
            changelog_range="$previous_tag..$release_commit"
          else
            changelog_range="$release_commit"
          fi
          git log --no-merges --pretty=format:'%h%x1f%s%x1f%b%x1e' "$changelog_range" > commits.txt

          RELEASE_TAG="$release_tag" node <<'NODE' > release-changelog.md
          const fs = require("fs");
          const repo = process.env.GITHUB_REPOSITORY || "";
          const tag = process.env.RELEASE_TAG || "";
          const raw = fs.readFileSync("commits.txt", "utf8");
          const commits = raw.split("\x1e").map((chunk) => {
            const [sha = "", subject = "", ...body] = chunk.split("\x1f");
            return {
              sha: sha.trim(),
              subject: subject.trim(),
              body: body.join("\x1f").trim()
            };
          }).filter((commit) => commit.sha && commit.subject);

          const link = (commit) => repo
            ? `- [${commit.sha}](https://github.com/${repo}/commit/${commit.sha}) ${commit.subject}`
            : `- ${commit.sha} ${commit.subject}`;
          const typeOf = (subject) => {
            const match = /^(feat|fix|perf|docs|test|build|ci|refactor|chore)(\([^)]*\))?:/i.exec(subject);
            return match ? match[1].toLowerCase() : "other";
          };
          const sectionTitles = {
            feat: "新增功能",
            fix: "问题修复",
            perf: "性能优化",
            docs: "文档",
            test: "测试",
            build: "构建与发布",
            ci: "构建与发布",
            refactor: "重构与优化",
            chore: "其他变更",
            other: "其他变更"
          };

          const important = [];
          for (const commit of commits) {
            const lines = commit.body.split(/\r?\n/);
            let collecting = false;
            for (const line of lines) {
              const heading = /^重要变更[:：]\s*(.*)$/.exec(line.trim());
              if (heading) {
                collecting = true;
                if (heading[1]) important.push(`- ${heading[1]}`);
                continue;
              }
              if (!collecting || !line.trim()) continue;
              if (/^[-*]\s+/.test(line.trim())) {
                important.push(line.trim().replace(/^\*\s+/, "- "));
              } else {
                collecting = false;
              }
            }
          }

          const groups = new Map();
          for (const commit of commits) {
            const type = typeOf(commit.subject);
            const title = sectionTitles[type];
            if (!groups.has(title)) groups.set(title, []);
            groups.get(title).push(commit);
          }

          const output = [`# Codex Island ${tag}`];
          if (important.length) {
            output.push("", "## 重要变更", "", ...important);
          }
          for (const [title, items] of groups) {
            output.push("", `## ${title}`, "", ...items.map(link));
          }
          process.stdout.write(output.join("\n").trim() + "\n");
          NODE

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-changelog
          path: release-changelog.md
          retention-days: 1

  macos-release:
    name: Build macOS installers
    runs-on: macos-15
    needs: validate
    env:
      HAS_MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' }}
      RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test Rust sidecar
        run: cargo test
        working-directory: codex-watcher

      - name: Test macOS app
        run: |
          xcodebuild test \
            -project CodexIsland.xcodeproj \
            -scheme CodexIsland \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=YES

      - name: Import Apple signing certificate
        if: env.HAS_MACOS_CERTIFICATE == 'true'
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-keychain-password}"

          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Build Release app (universal)
        run: |
          rm -rf build
          xcodebuild \
            -project CodexIsland.xcodeproj \
            -scheme CodexIsland \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=YES \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            SYMROOT="$PWD/build" \
            build

      - name: Package macOS artifacts (default and universal)
        env:
          MACOS_APP_SIGN_IDENTITY: ${{ secrets.MACOS_APP_SIGN_IDENTITY }}
          MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          chmod +x scripts/package_macos_release.sh
          VERSION="$RELEASE_TAG" scripts/package_macos_release.sh build/Release/CodexIsland.app
          VERSION="$RELEASE_TAG" ARTIFACT_SUFFIX="-universal" CLEAN_DIST=0 scripts/package_macos_release.sh build/Release/CodexIsland.app

      - name: Build Release app (x86_64)
        run: |
          rm -rf build-x86_64
          CODEX_ISLAND_SIDECAR_ARCH=x86_64 xcodebuild \
            -project CodexIsland.xcodeproj \
            -scheme CodexIsland \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=YES \
            ARCHS='x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            SYMROOT="$PWD/build-x86_64" \
            build

      - name: Package macOS artifacts (x86_64)
        env:
          MACOS_APP_SIGN_IDENTITY: ${{ secrets.MACOS_APP_SIGN_IDENTITY }}
          MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          VERSION="$RELEASE_TAG" ARTIFACT_SUFFIX="-x86_64" CLEAN_DIST=0 scripts/package_macos_release.sh build-x86_64/Release/CodexIsland.app

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd dist
          : > SHA256SUMS.txt
          while IFS= read -r -d '' file; do
            shasum -a 256 "$file" >> SHA256SUMS.txt
            shasum -a 256 "$file" > "$file.sha256"
          done < <(find . -maxdepth 1 -type f ! -name '*.sha256' ! -name 'SHA256SUMS.txt' -print0)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CodexIsland-${{ needs.validate.outputs.release_tag }}-macOS
          path: dist/*

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-changelog
          path: release-notes

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.release_tag }}
          name: Codex Island ${{ needs.validate.outputs.release_tag }}
          body_path: release-notes/release-changelog.md
          files: dist/*
          overwrite_files: true
          fail_on_unmatched_files: true
