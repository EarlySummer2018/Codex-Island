name: CodexIsland

options:
  minimumXcodeGenVersion: 2.45.4
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.7
    SWIFT_VERSION: 5.0

targets:
  CodexIsland:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: CodexIsland
        excludes:
          - Info.plist
          - CodexIsland.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huang.codexisland
        INFOPLIST_FILE: CodexIsland/Info.plist
        CODE_SIGN_ENTITLEMENTS: CodexIsland/CodexIsland.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    postBuildScripts:
      - name: Build Rust Sidecar
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          export RUSTUP_DIST_SERVER="https://static.rust-lang.org"
          export RUSTUP_UPDATE_ROOT="https://static.rust-lang.org/rustup"
          cd "$PROJECT_DIR/codex-watcher"
          if [ "${CONFIGURATION:-Debug}" = "Release" ]; then
            command -v rustup >/dev/null 2>&1 || {
              echo "rustup is required for Release sidecar builds." >&2
              exit 1
            }

            case "${CODEX_ISLAND_SIDECAR_ARCH:-universal}" in
              x86_64)
                rustup target add x86_64-apple-darwin
                cargo build --release --target x86_64-apple-darwin
                SIDECAR_PATH="$PROJECT_DIR/codex-watcher/target/x86_64-apple-darwin/release/codex-watcher"
                ;;
              arm64)
                rustup target add aarch64-apple-darwin
                cargo build --release --target aarch64-apple-darwin
                SIDECAR_PATH="$PROJECT_DIR/codex-watcher/target/aarch64-apple-darwin/release/codex-watcher"
                ;;
              universal|"")
                rustup target add aarch64-apple-darwin x86_64-apple-darwin
                cargo build --release --target aarch64-apple-darwin
                cargo build --release --target x86_64-apple-darwin
                mkdir -p "$PROJECT_DIR/codex-watcher/target/release"
                lipo -create \
                  "$PROJECT_DIR/codex-watcher/target/aarch64-apple-darwin/release/codex-watcher" \
                  "$PROJECT_DIR/codex-watcher/target/x86_64-apple-darwin/release/codex-watcher" \
                  -output "$PROJECT_DIR/codex-watcher/target/release/codex-watcher-universal"
                SIDECAR_PATH="$PROJECT_DIR/codex-watcher/target/release/codex-watcher-universal"
                ;;
              *)
                echo "Unsupported CODEX_ISLAND_SIDECAR_ARCH: $CODEX_ISLAND_SIDECAR_ARCH" >&2
                exit 1
                ;;
            esac
          else
            cargo build
            SIDECAR_PATH="$PROJECT_DIR/codex-watcher/target/debug/codex-watcher"
          fi
          mkdir -p "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          cp "$SIDECAR_PATH" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/codex-watcher"
          chmod +x "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/codex-watcher"
  CodexIslandTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: CodexIslandTests
    dependencies:
      - target: CodexIsland
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huang.codexisland.tests
        GENERATE_INFOPLIST_FILE: YES
